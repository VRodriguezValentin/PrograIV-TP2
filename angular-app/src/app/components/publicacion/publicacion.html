<div class="post-card">
  <div class="post-header">
    <div class="post-autor">
      @if (pub.usuario.imagenPerfil) {
        <img [src]="pub.usuario.imagenPerfil" class="post-avatar-img" [alt]="pub.usuario.nombreUsuario" />
      } @else {
        <div class="post-avatar">{{ iniciales(pub.usuario.nombre, pub.usuario.apellido) }}</div>
      }
      <div class="post-autor-info">
        <span class="post-username">{{ pub.usuario.nombreUsuario }}</span>
        <span class="post-tiempo">{{ tiempoRelativo(pub.createdAt) }}</span>
      </div>
    </div>

    @if (esMiPublicacion()) {
      <div class="post-opciones-wrapper">
        <button class="btn-opciones" (click)="toggleDropdown()">
          <span class="mat-icon">more_vert</span>
        </button>
        @if (dropdownAbierto()) {
          <div class="opciones-dropdown">
            <button class="opcion-item opcion-eliminar" (click)="eliminar()">
              <span class="mat-icon sm">delete</span> Eliminar
            </button>
          </div>
        }
      </div>
    }
  </div>

  <div class="post-body" (click)="verDetalle()">
    <p class="post-texto">{{ pub.texto }}</p>
    @if (pub.imagen) {
      <img [src]="pub.imagen" class="post-imagen" alt="imagen de publicacion" />
    }
  </div>

  <div class="post-footer">
    <button class="btn-accion" [class.liked]="likeDado()" (click)="toggleLike()">
      <span class="mat-icon sm">{{ likeDado() ? 'favorite' : 'favorite_border' }}</span>
      <span>{{ cantLikes() }}</span>
    </button>
    <button class="btn-accion" (click)="verDetalle()">
      <span class="mat-icon sm">chat_bubble_outline</span>
      <span>{{ comentariosTotales() }}</span>
    </button>
  </div>
</div>
